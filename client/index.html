<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Traffic</title>
		<link rel="stylesheet" href="index.css">
	</head>
	<body>
		
		<div id="gameView" class="view hidden">
			<canvas id="gameCanvas"></canvas>
			<div id="fps"></div>
			<div id="handPanel"></div>
			
			<div id="gameCalendar" class="sideGamePanel">
				<div id="gameDay">Monday, 1st April</div>
				<div id="gameYear">Year 0000</div>
				<div id="gameHour">00:00</div>
			</div>

			<div id="gameMoney" class="sideGamePanel">212$</div>

			<div id="turnSelector" class="hidden">
				<div class="ts-panel">
					<div class="ts-row" id="ts-row-0"></div>
					<div class="ts-row" id="ts-row-1"></div>
					<div class="ts-actions">
					<button id="ts-cancel">Annuler</button>
					<button id="ts-ok" class="ts-ok">OK</button>
					</div>
				</div>
			</div>
        </div>

		<div id="homeView" class="view hidden">
			<button id="home-createSession">Create session</button>
			<button id="home-joinSession">Join session</button>
		</div>

		<script>
			window.IMG_ROOT_PATH = "";
			window.DEBUG = true;
			window.SERV_ADDRESS = "ws://localhost:3704";
			window.WASM_PATH = "../wasm/api.wasm"

			import("/src/index.ts").then(m => {m.startGame()});
			

			setTimeout(() => {
				if (document.getElementById("homeView").classList.contains('hidden'))
					return;

				document.getElementById("home-createSession").click();
			}, 500);
			/*import("/src/index.ts").then(m => {
				m.startGame();
				window.switchToTestState = true;
			});*/

		</script>
	</body>
</html>
