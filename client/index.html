<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Traffic</title>
		<link rel="stylesheet" href="index.css">
	</head>
	<body>
		
		<div id="gameView" class="view hidden">
			<canvas id="gameCanvas"></canvas>
			<div id="fps"></div>
			<div id="handPanel"></div>
			
			<div id="turnSelector" class="hidden">
				<div class="input-group" id="group-1">
					<label>First Input:</label>
					<select class="main-direction"></select>
					<div class="sub-options"></div>
				</div>

				<div class="input-group" id="group-2">
					<label>Second Input:</label>
					<select class="main-direction"></select>
					<div class="sub-options"></div>
				</div>

				<div class="actions">
					<button id="btn-ok">OK</button>
					<button id="btn-cancel">Cancel</button>
				</div>
			</div>
        </div>

		<div id="homeView" class="view hidden">
			<button id="home-createSession">Create session</button>
			<button id="home-joinSession">Join session</button>
		</div>

		<script>
			window.IMG_ROOT_PATH = "";
			window.DEBUG = true;
			window.SERV_ADDRESS = "ws://localhost:3704";
			window.WASM_PATH = "../wasm/api.wasm"

			import("/src/index.ts").then(m => {m.startGame()});
			

			setTimeout(() => {
				if (document.getElementById("homeView").classList.contains('hidden'))
					return;

				document.getElementById("home-createSession").click();
			}, 500);
			/*import("/src/index.ts").then(m => {
				m.startGame();
				window.switchToTestState = true;
			});*/

		</script>
	</body>
</html>
